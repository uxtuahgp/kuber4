apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-app
  labels:
    app: dep-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dep-app
  template:
    metadata:
      labels:
        app: dep-app
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
        - name: multitool
          image: wbitt/network-multitool
          ports:
            - containerPort: 8080
          env:
            - name: "HTTP_PORT"
              value: "8080"
